<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Cake Pomodoro</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <div class="app">

    <h1>🍰 Cake Pomodoro</h1>

    <img id="cake" src="assets/cakes/cake_stage1.png" width="200">

    </div>

  </div>

  <script src="script.js"></script>

</body>
</html>
